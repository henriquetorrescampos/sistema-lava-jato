<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliacoes - AutoShine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="avaliacoes">
  <div class="bg-decor"></div>
  <header class="topbar container">
    <a class="brand" href="index.html">
      <span class="brand-dot"></span>
      <span>AutoShine</span>
    </a>
    <nav class="main-nav">
      <a href="index.html">Inicio</a>
      <a href="mapa.html">Mapa</a>
      <a href="perfil.html">Lava Jato</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="cadastro.html?mode=login">Acessar</a>
    </nav>
  </header>

  <main class="container reveal-root">
    <section class="reviews-summary reveal-item">
      <h1 id="reviews-shop-title">Avaliacoes do estabelecimento</h1>
      <p class="score"><span class="stars" id="reviews-average-stars">&#9733; 0,0</span></p>
      <p id="reviews-total">Baseado em 0 avaliacoes</p>
      <button id="toggle-review-form" class="btn btn-primary" type="button">Deixar avaliacao</button>

      <form id="review-form" class="review-form hidden" novalidate>
        <div class="field">
          <label for="reviewer-name">Seu nome</label>
          <input id="reviewer-name" name="reviewerName" type="text" placeholder="Ex.: Carlos S." required />
        </div>

        <div class="field">
          <label for="review-rating">Nota</label>
          <select id="review-rating" name="rating" required>
            <option value="">Selecione</option>
            <option value="5">5 - Excelente</option>
            <option value="4">4 - Muito bom</option>
            <option value="3">3 - Bom</option>
            <option value="2">2 - Regular</option>
            <option value="1">1 - Ruim</option>
          </select>
        </div>

        <div class="field">
          <label for="review-comment">Comentario</label>
          <textarea id="review-comment" name="comment" rows="4" placeholder="Conte como foi seu atendimento e qualidade do servico." required></textarea>
        </div>

        <div class="field">
          <label for="review-photo">URL da foto (opcional)</label>
          <input id="review-photo" name="photoUrl" type="url" placeholder="https://..." />
        </div>

        <button class="btn btn-secondary" type="submit">Publicar avaliacao</button>
      </form>
    </section>

    <section id="reviews-list" class="reviews-list reveal-item">
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
