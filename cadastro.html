<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso - AutoShine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="cadastro">
  <div class="bg-decor"></div>
  <header class="topbar container">
    <a class="brand" href="index.html">
      <span class="brand-dot"></span>
      <span>AutoShine</span>
    </a>
    <nav class="main-nav">
      <a href="index.html">Inicio</a>
      <a href="mapa.html">Mapa</a>
      <a href="perfil.html">Lava Jato</a>
      <a href="dashboard.html">Dashboard</a>
      <a class="active" href="cadastro.html?mode=login">Acessar</a>
    </nav>
  </header>

  <main class="container reveal-root">
    <section class="auth-shell reveal-item">
      <div>
        <p class="eyebrow">Acesso rapido</p>
        <h1 id="auth-title">Entrar para usar os servicos</h1>
        <p id="auth-subtitle" class="hero-text">Voce pode ver os lava jatos sem login, mas para agendar e avaliar e necessario entrar na conta.</p>
      </div>

      <div class="auth-switch" role="tablist" aria-label="Alternar entre login e cadastro">
        <button id="switch-login" class="chip active" type="button" role="tab" aria-selected="true">Entrar</button>
        <button id="switch-signup" class="chip" type="button" role="tab" aria-selected="false">Cadastrar</button>
      </div>

      <div id="login-panel" class="auth-panel">
        <div style="text-align: center;">
          <button id="google-login-btn" class="btn btn-google btn-block" type="button">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" style="width: 20px; height: 20px; margin-right: 8px;">
            Entrar com Google
          </button>
        </div>
        <p class="auth-separator"><span>ou entre com email e senha</span></p>

        <form id="login-form" class="booking-form" novalidate>
          <div class="field">
            <label for="login-email">Email</label>
            <input id="login-email" name="email" type="email" placeholder="Ex.: voce@email.com" required />
          </div>

          <div class="field">
            <label for="login-password">Senha</label>
            <input id="login-password" name="password" type="password" placeholder="Digite sua senha" required />
          </div>

          <button class="btn btn-primary btn-block" type="submit">Entrar</button>
        </form>
      </div>

      <div id="signup-panel" class="auth-panel hidden">
        <div style="text-align: center;">
          <button id="google-signup-btn" class="btn btn-google btn-block" type="button">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" style="width: 20px; height: 20px; margin-right: 8px;">
            Continuar com Google
          </button>
        </div>
        <p class="auth-separator"><span>ou preencha seus dados</span></p>

      <form id="signup-form" class="booking-form" novalidate>
        <div class="field-grid">
          <div class="field">
            <label for="signup-name">Nome completo</label>
            <input id="signup-name" name="name" type="text" placeholder="Ex.: Joao da Silva" required />
          </div>
          <div class="field">
            <label for="signup-email">Email</label>
            <input id="signup-email" name="email" type="email" placeholder="Ex.: joao@email.com" required />
          </div>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="signup-cpf">CPF</label>
            <input id="signup-cpf" name="cpf" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required />
          </div>
          <div class="field">
            <label for="signup-phone">Telefone</label>
            <input id="signup-phone" name="phone" type="tel" inputmode="numeric" maxlength="15" placeholder="(00) 00000-0000" required />
          </div>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="signup-password">Senha</label>
            <input id="signup-password" name="password" type="password" minlength="6" placeholder="Minimo 6 caracteres" required />
          </div>
          <div class="field">
            <label for="signup-password-confirm">Confirmar senha</label>
            <input id="signup-password-confirm" name="passwordConfirm" type="password" minlength="6" placeholder="Digite novamente" required />
          </div>
        </div>

        <label class="auth-checkbox">
          <input id="signup-terms" name="terms" type="checkbox" required />
          Concordo com os termos de uso e politica da plataforma.
        </label>

        <button class="btn btn-primary btn-block" type="submit">Criar conta</button>
      </form>
      </div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
