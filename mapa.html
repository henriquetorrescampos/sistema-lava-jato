<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa - AutoShine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="mapa">
  <div class="bg-decor"></div>
  <header class="topbar container">
    <a class="brand" href="index.html">
      <span class="brand-dot"></span>
      <span>AutoShine</span>
    </a>
    <nav class="main-nav">
      <a href="index.html">Inicio</a>
      <a class="active" href="mapa.html">Mapa</a>
      <a href="perfil.html">Lava Jato</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
  </header>

  <main class="container page-map reveal-root">
    <section class="section-head reveal-item">
      <h1>Lava jatos perto de voce</h1>
    </section>

    <section class="chip-list reveal-item" id="map-filter-list">
      <button class="chip active" data-filter="todos">Todos</button>
      <button class="chip" data-filter="lavagem">Lavagem</button>
      <button class="chip" data-filter="polimento">Polimento</button>
      <button class="chip" data-filter="higienizacao">Higienizacao</button>
      <button class="chip" data-filter="detalhamento">Detalhamento</button>
    </section>

    <section class="map-shell reveal-item">
      <div class="map-canvas" id="map-canvas">
        <button class="map-pin" style="top: 28%; left: 36%;" data-shop="BlueWash Premium" data-rating="4.8" data-distance="1,2 km" data-service="lavagem">1</button>
        <button class="map-pin" style="top: 58%; left: 52%;" data-shop="BlackCar Studio" data-rating="4.7" data-distance="2,0 km" data-service="higienizacao">2</button>
        <button class="map-pin" style="top: 40%; left: 70%;" data-shop="Prime Auto Care" data-rating="4.9" data-distance="3,4 km" data-service="detalhamento">3</button>
      </div>

      <article class="map-bottom-card" id="map-selected-card">
        <h3>BlueWash Premium</h3>
        <p><span class="stars">&#9733; 4.8</span> 1,2 km</p>
        <a class="btn btn-primary" href="perfil.html">Ver servicos</a>
      </article>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
